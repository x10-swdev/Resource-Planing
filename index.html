<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan All — Resource Planning 2024–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d0f14; --ink2:#1a1e2b;
  --surface:#f4f5f7; --surface2:#ecedf0;
  --white:#ffffff;
  --blue:#2563eb; --blue-l:#dbeafe; --blue-d:#1e40af;
  --teal:#0d9488; --teal-l:#ccfbf1;
  --amber:#d97706; --amber-l:#fef3c7;
  --rose:#e11d48; --rose-l:#ffe4e6;
  --violet:#7c3aed; --violet-l:#ede9fe;
  --green:#16a34a; --green-l:#dcfce7;
  --gray:#64748b; --gray-l:#f1f5f9;
  --text:#1e2330; --text2:#4a5568; --text3:#8896a5;
  --border:#e2e5ea;
  --shadow:0 1px 3px rgba(13,15,20,.06),0 4px 12px rgba(13,15,20,.04);
  --shadow-md:0 4px 16px rgba(13,15,20,.10),0 1px 4px rgba(13,15,20,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--surface);color:var(--text);font-size:13px}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--ink);
  display:flex;align-items:center;gap:12px;
  padding:0 20px;height:52px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.tb-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;
  letter-spacing:-.3px;flex-shrink:0;
}
.tb-logo span{color:#60a5fa}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.12);flex-shrink:0}
.tb-title{font-size:12px;color:rgba(255,255,255,.5);flex-shrink:0}
.tb-spacer{flex:1}
.tb-badge{font-size:10px;background:rgba(37,99,235,.35);color:#93c5fd;padding:3px 10px;border-radius:20px;font-weight:600}

/* ── TOOLBAR ── */
.toolbar{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:10px 20px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:52px;z-index:190;
  box-shadow:var(--shadow);
}
.toolbar-group{display:flex;align-items:center;gap:6px}
.tl-label{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
select,input[type=text]{
  height:32px;padding:0 10px;border:1px solid var(--border);border-radius:7px;
  font-size:12px;font-family:'IBM Plex Sans Thai',sans-serif;color:var(--text);
  background:var(--white);outline:none;transition:border .15s;
}
select:focus,input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.btn{
  height:32px;padding:0 14px;border-radius:7px;
  font-size:12px;font-weight:500;font-family:'IBM Plex Sans Thai',sans-serif;
  cursor:pointer;border:1px solid var(--border);background:var(--white);
  color:var(--text2);transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-d)}
.btn.danger{background:var(--rose-l);color:var(--rose);border-color:var(--rose)}
.btn.danger:hover{background:#fecdd3}
.btn.success{background:var(--green-l);color:var(--green);border-color:var(--green)}
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* ── YEAR TABS ── */
.year-tabs{display:flex;gap:3px;padding:3px;background:var(--surface2);border-radius:8px}
.ytab{padding:4px 14px;border-radius:5px;font-size:11.5px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s}
.ytab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── SUMMARY BAR ── */
.summary-bar{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:6px 20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;
  font-size:11.5px;
}
.sb-item{display:flex;align-items:center;gap:5px}
.sb-dot{width:8px;height:8px;border-radius:50%}
.sb-val{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--text);font-size:12px}
.sb-lbl{color:var(--text3)}

/* ── TABLE WRAPPER ── */
.table-outer{overflow:auto;position:relative}

/* ── FROZEN TABLE ── */
table{border-collapse:collapse;width:max-content;font-size:12px}
th,td{border:1px solid var(--border);white-space:nowrap;vertical-align:middle}

/* Fixed left columns */
th.col-name,td.col-name{
  position:sticky;left:0;z-index:10;
  min-width:160px;max-width:160px;
  background:var(--white);
  font-weight:500;
}
th.col-pos,td.col-pos{
  position:sticky;left:160px;z-index:10;
  min-width:130px;max-width:130px;
  background:var(--white);
}
th.col-type,td.col-type{
  position:sticky;left:290px;z-index:10;
  min-width:100px;max-width:100px;
  background:var(--white);
}
th.col-proj,td.col-proj{
  position:sticky;left:390px;z-index:10;
  min-width:200px;max-width:200px;
  background:var(--white);
}

/* Sticky header */
thead th{
  position:sticky;top:0;z-index:20;
  background:var(--ink2);color:rgba(255,255,255,.85);
  font-weight:600;font-size:11px;padding:8px 10px;text-align:center;
  letter-spacing:.02em;
}
thead th.col-name,thead th.col-pos,thead th.col-type,thead th.col-proj{
  z-index:30;background:var(--ink);text-align:left;
}
thead .yr-2024{background:#1e3a5f}
thead .yr-2025{background:#1a3a2a}
thead .yr-2026{background:#2d1a4a}

/* Sub-header row */
thead tr:first-child th{padding:5px 8px;font-size:10px;letter-spacing:.06em;text-transform:uppercase}

/* Data cells */
td{padding:0;height:30px;text-align:center}
td.col-name,td.col-pos,td.col-proj,td.col-type{padding:4px 10px;text-align:left}
td.col-name{font-size:11.5px}
td.col-pos{font-size:11px;color:var(--text2)}
td.col-proj{font-size:11px;color:var(--text2)}

/* Month cell input */
.cell-input{
  width:100%;height:100%;border:none;outline:none;background:transparent;
  text-align:center;font-family:'JetBrains Mono',monospace;font-size:11.5px;
  color:var(--text);padding:0 4px;cursor:default;
  display:block;
}
.cell-input:focus{cursor:text}

/* Row striping per person */
.person-group-0 td{background:#fff}
.person-group-1 td{background:#fafbff}
.person-group-0 td.col-name,.person-group-0 td.col-pos,.person-group-0 td.col-type,.person-group-0 td.col-proj{background:#fff}
.person-group-1 td.col-name,.person-group-1 td.col-pos,.person-group-1 td.col-type,.person-group-1 td.col-proj{background:#fafbff}

/* Type colors */
td.type-external{background:#eff6ff!important}
td.type-external .cell-input{color:#1e40af}
td.type-leave{background:#fff7ed!important}
td.type-leave .cell-input{color:#92400e}
td.type-bench{background:#f9fafb!important}
td.type-bench .cell-input{color:#475569}
td.type-internal{background:#f0fdf4!important}
td.type-internal .cell-input{color:#166534}
td.type-lnd{background:#fdf4ff!important}
td.type-lnd .cell-input{color:#6b21a8}
td.type-overrun{background:#fff1f2!important}
td.type-overrun .cell-input{color:#9f1239}
td.type-mgmt{background:#fffbeb!important}
td.type-mgmt .cell-input{color:#78350f}
td.type-opp{background:#ecfeff!important}
td.type-opp .cell-input{color:#0e7490}

/* Edited cell highlight */
.cell-edited{background:#fef9c3!important}
.cell-edited .cell-input{color:#713f12!important;font-weight:600}

/* Person separator row */
tr.person-sep td{border-top:2px solid #cbd5e1!important}

/* Subtotal row */
tr.subtotal-row td{
  background:var(--surface2)!important;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  color:var(--text2);
}
tr.subtotal-row .cell-input{font-weight:700;color:var(--text)}

/* TOTAL row */
tr.total-row td{
  background:var(--ink2)!important;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;color:#e2e8f0;
  position:sticky;bottom:0;z-index:15;
}
tr.total-row td.col-name,tr.total-row td.col-pos,tr.total-row td.col-type,tr.total-row td.col-proj{
  background:var(--ink)!important;color:#fff;z-index:25;
}

/* Type badge */
.type-badge{
  display:inline-block;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:10px;
}
.tb-ext{background:#dbeafe;color:#1e40af}
.tb-int{background:#dcfce7;color:#15803d}
.tb-leave{background:#fed7aa;color:#9a3412}
.tb-bench{background:#f1f5f9;color:#475569}
.tb-lnd{background:#ede9fe;color:#5b21b6}
.tb-over{background:#ffe4e6;color:#9f1239}
.tb-mgmt{background:#fef3c7;color:#713f12}
.tb-opp{background:#cffafe;color:#0e7490}
.tb-prod{background:#dcfce7;color:#065f46}

/* Add row modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text);margin-bottom:18px}
.modal label{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.04em}
.modal select,.modal input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:13px;font-family:'IBM Plex Sans Thai',sans-serif;color:var(--text)}
.modal .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--white);transition:all .15s}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Notification toast */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:12.5px;
  opacity:0;transform:translateY(10px);transition:all .25s;z-index:9999;
  box-shadow:var(--shadow-md);
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok::before{content:'✓ ';color:#4ade80}
.toast.err::before{content:'✗ ';color:#f87171}

/* Scrollbar */
.table-outer::-webkit-scrollbar{width:6px;height:6px}
.table-outer::-webkit-scrollbar-track{background:var(--surface)}
.table-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:300px;font-size:14px;color:var(--text3)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">SW <span>Dev</span></div>
  <div class="tb-sep"></div>
  <div class="tb-title">Plan All — Resource Planning 2024–2026</div>
  <div class="tb-spacer"></div>
  <div class="tb-badge" id="rowCount">Loading...</div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <span class="tl-label">Year</span>
    <div class="year-tabs">
      <button class="ytab active" onclick="setYear('all',this)">All</button>
      <button class="ytab" onclick="setYear('2024',this)">2024</button>
      <button class="ytab" onclick="setYear('2025',this)">2025</button>
      <button class="ytab" onclick="setYear('2026',this)">2026</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="toolbar-group">
    <span class="tl-label">Person</span>
    <select id="filterPerson" onchange="renderTable()">
      <option value="">All</option>
    </select>
  </div>
  <div class="toolbar-group">
    <span class="tl-label">Type</span>
    <select id="filterType" onchange="renderTable()">
      <option value="">All</option>
      <option>External</option>
      <option>External Overrun</option>
      <option>External Uncharge</option>
      <option>Internal</option>
      <option>Leave</option>
      <option>On bench</option>
      <option>Learning and Development</option>
      <option>Management</option>
      <option>Opp/Presales</option>
      <option>Product Dev</option>
    </select>
  </div>
  <div class="toolbar-group">
    <span class="tl-label">Search</span>
    <input type="text" id="searchBox" placeholder="Project / Name..." oninput="renderTable()" style="width:180px">
  </div>
  <div class="divider"></div>
  <button class="btn primary" onclick="openAddModal()">+ Add Row</button>
  <button class="btn success" onclick="exportCSV()">⬇ Export CSV</button>
  <button class="btn danger" id="deleteBtn" style="display:none" onclick="deleteSelected()">🗑 Delete Selected</button>
  <div class="tb-spacer"></div>
  <div id="editCount" style="font-size:11px;color:var(--text3)"></div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar">
  <div class="sb-item"><div class="sb-dot" style="background:var(--blue)"></div><span class="sb-lbl">External:</span><span class="sb-val" id="s-ext">—</span></div>
  <div class="sb-item"><div class="sb-dot" style="background:var(--green)"></div><span class="sb-lbl">Internal:</span><span class="sb-val" id="s-int">—</span></div>
  <div class="sb-item"><div class="sb-dot" style="background:var(--amber)"></div><span class="sb-lbl">Leave:</span><span class="sb-val" id="s-leave">—</span></div>
  <div class="sb-item"><div class="sb-dot" style="background:var(--gray)"></div><span class="sb-lbl">On bench:</span><span class="sb-val" id="s-bench">—</span></div>
  <div class="sb-item"><div class="sb-dot" style="background:var(--violet)"></div><span class="sb-lbl">L&D:</span><span class="sb-val" id="s-lnd">—</span></div>
  <div style="margin-left:auto;font-size:11px;color:var(--text3)">คลิก cell เพื่อแก้ไข • กด Enter/Tab เพื่อบันทึก</div>
</div>

<!-- TABLE -->
<div class="table-outer" id="tableOuter" style="height:calc(100vh - 160px)">
  <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
</div>

<!-- ADD ROW MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>เพิ่มแถวใหม่</h2>
    <label>ชื่อบุคคล</label>
    <select id="m-person"></select>
    <label>ตำแหน่ง (2025)</label>
    <input type="text" id="m-pos" placeholder="เช่น Senior Developer">
    <label>ประเภท (Type)</label>
    <div class="chip-row" id="typeChips"></div>
    <label>Project</label>
    <input type="text" id="m-project" list="projectList" placeholder="ชื่อ project หรือพิมพ์ใหม่">
    <datalist id="projectList"></datalist>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn primary" onclick="addRow()">เพิ่มแถว</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// DATA — embedded from Excel extraction
// ════════════════════════════════════════════════
const MONTHS_ALL = ['2024-01','2024-02','2024-03','2024-04','2024-05','2024-06','2024-07','2024-08','2024-09','2024-10','2024-11','2024-12','2025-01','2025-02','2025-03','2025-04','2025-05','2025-06','2025-07','2025-08','2025-09','2025-10','2025-11','2025-12','2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];

const MONTH_LABELS = {'2024-01':'Jan','2024-02':'Feb','2024-03':'Mar','2024-04':'Apr','2024-05':'May','2024-06':'Jun','2024-07':'Jul','2024-08':'Aug','2024-09':'Sep','2024-10':'Oct','2024-11':'Nov','2024-12':'Dec','2025-01':'Jan','2025-02':'Feb','2025-03':'Mar','2025-04':'Apr','2025-05':'May','2025-06':'Jun','2025-07':'Jul','2025-08':'Aug','2025-09':'Sep','2025-10':'Oct','2025-11':'Nov','2025-12':'Dec','2026-01':'Jan','2026-02':'Feb','2026-03':'Mar','2026-04':'Apr','2026-05':'May','2026-06':'Jun','2026-07':'Jul','2026-08':'Aug','2026-09':'Sep','2026-10':'Oct','2026-11':'Nov','2026-12':'Dec'};

const WORKING_DAYS = {'2024-01':22,'2024-02':20,'2024-03':21,'2024-04':19,'2024-05':20,'2024-06':19,'2024-07':21,'2024-08':21,'2024-09':21,'2024-10':21,'2024-11':21,'2024-12':19,'2025-01':21,'2025-02':19,'2025-03':21,'2025-04':19,'2025-05':20,'2025-06':19,'2025-07':21,'2025-08':20,'2025-09':22,'2025-10':21,'2025-11':20,'2025-12':21,'2026-01':21,'2026-02':19,'2026-03':21,'2026-04':19,'2026-05':20,'2026-06':19,'2026-07':21,'2026-08':20,'2026-09':22,'2026-10':21,'2026-11':20,'2026-12':21};

const TYPE_CLASSES = {
  'External':'type-external','External Overrun':'type-overrun','External Uncharge':'type-overrun',
  'Internal':'type-internal','Leave':'type-leave','On bench':'type-bench',
  'Learning and Development':'type-lnd','Management':'type-mgmt',
  'Opp/Presales':'type-opp','Product Dev':'type-internal'
};
const TYPE_BADGES = {
  'External':'tb-ext','External Overrun':'tb-over','External Uncharge':'tb-over',
  'Internal':'tb-int','Leave':'tb-leave','On bench':'tb-bench',
  'Learning and Development':'tb-lnd','Management':'tb-mgmt',
  'Opp/Presales':'tb-opp','Product Dev':'tb-prod'
};

// Will be loaded
let ROWS = [];
let PEOPLE = [];
let PROJECTS = [];
let editedCells = new Map(); // key: "rowIdx-month" => value
let selectedRows = new Set();
let currentYear = 'all';
let nextId = 0;

// ── Load data from embedded JSON ──────────────────
async function loadData() {
  // Data is embedded as JS array below
  ROWS = PLAN_DATA.map((r,i) => ({...r, id: i}));
  nextId = ROWS.length;
  PEOPLE = [...new Set(ROWS.map(r=>r.name_en).filter(n=>n&&n!='nan'))].sort();
  PROJECTS = [...new Set(ROWS.map(r=>r.project).filter(p=>p&&!['Management','Internal','On bench','Leave','Opp/Presales','Learning and Development','Management '].includes(p)))].sort();

  // Fill person dropdown
  const sel = document.getElementById('filterPerson');
  PEOPLE.forEach(p => {
    const o = document.createElement('option');
    o.value = o.textContent = p;
    sel.appendChild(o);
  });

  // Fill modal person
  const mp = document.getElementById('m-person');
  PEOPLE.forEach(p => {
    const o = document.createElement('option');
    o.value = o.textContent = p;
    mp.appendChild(o);
  });

  // Fill project datalist
  const dl = document.getElementById('projectList');
  PROJECTS.forEach(p => {
    const o = document.createElement('option');
    o.value = p; dl.appendChild(o);
  });

  // Type chips
  const types = ['External','Internal','Leave','On bench','Learning and Development','Management','External Overrun','Opp/Presales','Product Dev'];
  const chipRow = document.getElementById('typeChips');
  types.forEach((t,i) => {
    const c = document.createElement('button');
    c.className = 'chip'+(i===0?' active':'');
    c.textContent = t;
    c.onclick = () => {
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      if(t!=='External' && t!=='External Overrun') {
        document.getElementById('m-project').value = t;
      }
    };
    chipRow.appendChild(c);
  });

  renderTable();
}

// ── ACTIVE MONTHS ──────────────────────────────────
function getActiveMonths() {
  if(currentYear === 'all') return MONTHS_ALL;
  return MONTHS_ALL.filter(m => m.startsWith(currentYear));
}

// ── FILTER ────────────────────────────────────────
function getFilteredRows() {
  const person = document.getElementById('filterPerson').value;
  const type   = document.getElementById('filterType').value;
  const q      = document.getElementById('searchBox').value.toLowerCase();
  return ROWS.filter(r => {
    if(person && r.name_en !== person) return false;
    if(type   && r.type   !== type)   return false;
    if(q && !r.project.toLowerCase().includes(q) && !r.name_en.toLowerCase().includes(q)) return false;
    return true;
  });
}

// ── RENDER TABLE ──────────────────────────────────
function renderTable() {
  const months = getActiveMonths();
  const rows   = getFilteredRows();
  document.getElementById('rowCount').textContent = rows.length + ' rows · ' + PEOPLE.length + ' people';

  // Summary counts
  let sums = {External:0,Internal:0,Leave:0,'On bench':0,'Learning and Development':0};
  rows.forEach(r => {
    if(sums[r.type] !== undefined) {
      months.forEach(m => {
        const v = getCell(r, m);
        if(v) sums[r.type] += v;
      });
    }
  });
  document.getElementById('s-ext').textContent   = sums.External.toFixed(1);
  document.getElementById('s-int').textContent   = sums.Internal.toFixed(1);
  document.getElementById('s-leave').textContent = sums.Leave.toFixed(1);
  document.getElementById('s-bench').textContent = sums['On bench'].toFixed(1);
  document.getElementById('s-lnd').textContent   = sums['Learning and Development'].toFixed(1);

  // Edit count
  const ec = editedCells.size;
  document.getElementById('editCount').textContent = ec ? `⚠️ ${ec} unsaved changes` : '';

  // Build HTML
  const outer = document.getElementById('tableOuter');

  // Group rows by person for striping
  const personOrder = [];
  const rowsByPerson = {};
  rows.forEach(r => {
    const k = r.name_en||r.name_th;
    if(!rowsByPerson[k]) { rowsByPerson[k]=[];personOrder.push(k); }
    rowsByPerson[k].push(r);
  });

  // Column totals
  const colTotals = {};
  months.forEach(m => colTotals[m] = 0);
  rows.forEach(r => months.forEach(m => {
    const v = getCell(r,m); if(v) colTotals[m] += v;
  }));

  let html = '<table id="mainTable"><thead>';
  // Year header
  html += '<tr>';
  html += '<th class="col-name" rowspan="2">ชื่อ-นามสกุล</th>';
  html += '<th class="col-pos" rowspan="2">ตำแหน่ง (2025)</th>';
  html += '<th class="col-type" rowspan="2">Type</th>';
  html += '<th class="col-proj" rowspan="2">Project</th>';
  const y24 = months.filter(m=>m.startsWith('2024')).length;
  const y25 = months.filter(m=>m.startsWith('2025')).length;
  const y26 = months.filter(m=>m.startsWith('2026')).length;
  if(y24) html += `<th colspan="${y24}" class="yr-2024">2024</th>`;
  if(y25) html += `<th colspan="${y25}" class="yr-2025">2025</th>`;
  if(y26) html += `<th colspan="${y26}" class="yr-2026">2026</th>`;
  html += '</tr><tr>';
  months.forEach(m => {
    const yr = m.split('-')[0];
    const cls = yr==='2024'?'yr-2024':yr==='2025'?'yr-2025':'yr-2026';
    const wd = WORKING_DAYS[m]||21;
    html += `<th class="${cls}" title="Working days: ${wd}">${MONTH_LABELS[m]}<br><span style="font-size:9px;opacity:.5">${wd}d</span></th>`;
  });
  html += '</tr></thead><tbody>';

  // Data rows
  personOrder.forEach((person, pi) => {
    const prows = rowsByPerson[person];
    const gc = pi%2===0?'person-group-0':'person-group-1';
    prows.forEach((r, ri) => {
      const isSep = ri===0 && pi>0;
      html += `<tr class="${gc}${isSep?' person-sep':''}" data-id="${r.id}" onclick="toggleSelect(event,${r.id})">`;
      // Fixed cols
      const nameDisplay = r.name_en && r.name_en!='nan' ? r.name_en : r.name_th;
      html += `<td class="col-name">${ri===0?nameDisplay:''}</td>`;
      html += `<td class="col-pos">${ri===0?`<span style="font-size:10.5px">${r.position_2025||r.position||''}</span>`:''}</td>`;
      const badgeCls = TYPE_BADGES[r.type]||'tb-ext';
      html += `<td class="col-type"><span class="type-badge ${badgeCls}">${r.type}</span></td>`;
      html += `<td class="col-proj">${r.project}</td>`;
      // Month cells
      const typeCls = TYPE_CLASSES[r.type]||'';
      months.forEach(m => {
        const val = getCell(r, m);
        const editKey = `${r.id}-${m}`;
        const isEdited = editedCells.has(editKey);
        const display = val ? (val===Math.floor(val)?val.toFixed(0):val.toFixed(4).replace(/\.?0+$/,'')) : '';
        html += `<td class="${typeCls}${isEdited?' cell-edited':''}">`;
        html += `<input class="cell-input" type="text" value="${display}" data-id="${r.id}" data-month="${m}" onfocus="this.select()" onblur="cellBlur(this)" onkeydown="cellKey(event,this)" oninput="markEdited(this)">`;
        html += '</td>';
      });
      html += '</tr>';
    });
    // Person subtotal row
    if(prows.length > 1) {
      const personTotals = {};
      months.forEach(m => {
        personTotals[m] = prows.reduce((s,r) => s + (getCell(r,m)||0), 0);
      });
      html += `<tr class="subtotal-row ${gc}">`;
      html += `<td class="col-name" style="font-size:10px;color:var(--text3);padding-left:12px">∑ ${prows.length} rows</td>`;
      html += `<td class="col-pos"></td><td class="col-type"></td><td class="col-proj"></td>`;
      months.forEach(m => {
        const v = personTotals[m];
        html += `<td><input class="cell-input" value="${v?v.toFixed(1):''}" readonly style="font-weight:700;color:var(--text)"></td>`;
      });
      html += '</tr>';
    }
  });

  // Grand total row
  html += '<tr class="total-row">';
  html += '<td class="col-name" colspan="2">TOTAL</td>';
  html += '<td class="col-type"></td><td class="col-proj"></td>';
  months.forEach(m => {
    const v = colTotals[m];
    html += `<td><input class="cell-input" value="${v?v.toFixed(1):''}" readonly></td>`;
  });
  html += '</tr>';

  html += '</tbody></table>';
  outer.innerHTML = html;
}

// ── CELL HELPERS ──────────────────────────────────
function getCell(row, month) {
  const key = `${row.id}-${month}`;
  if(editedCells.has(key)) return editedCells.get(key);
  return row.months[month] || 0;
}

function markEdited(input) {
  input.closest('td').classList.add('cell-edited');
}

function cellBlur(input) {
  const id    = parseInt(input.dataset.id);
  const month = input.dataset.month;
  const raw   = input.value.trim();
  const val   = raw === '' ? 0 : parseFloat(raw);
  if(isNaN(val)) { input.value = ''; return; }
  const key = `${id}-${month}`;
  const row = ROWS.find(r => r.id === id);
  const orig = row?.months[month] || 0;
  if(val === orig) {
    editedCells.delete(key);
    input.closest('td').classList.remove('cell-edited');
  } else {
    editedCells.set(key, val);
    input.closest('td').classList.add('cell-edited');
  }
  // Update display
  input.value = val ? (val===Math.floor(val)?val.toFixed(0):val.toFixed(4).replace(/\.?0+$/,'')) : '';
  updateSummaryAndTotals();
  document.getElementById('editCount').textContent = editedCells.size ? `⚠️ ${editedCells.size} unsaved changes` : '';
}

function cellKey(e, input) {
  if(e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    input.blur();
    // Move to next cell
    const allInputs = [...document.querySelectorAll('.cell-input:not([readonly])')];
    const idx = allInputs.indexOf(input);
    if(idx < allInputs.length-1) allInputs[idx+1].focus();
    showToast('บันทึกแล้ว ✓', 'ok');
  }
  if(e.key === 'Escape') { input.blur(); }
}

function updateSummaryAndTotals() {
  const months = getActiveMonths();
  const rows = getFilteredRows();
  let sums = {External:0,Internal:0,Leave:0,'On bench':0,'Learning and Development':0};
  rows.forEach(r => {
    if(sums[r.type] !== undefined) {
      months.forEach(m => { const v = getCell(r,m); if(v) sums[r.type] += v; });
    }
  });
  document.getElementById('s-ext').textContent   = sums.External.toFixed(1);
  document.getElementById('s-int').textContent   = sums.Internal.toFixed(1);
  document.getElementById('s-leave').textContent = sums.Leave.toFixed(1);
  document.getElementById('s-bench').textContent = sums['On bench'].toFixed(1);
  document.getElementById('s-lnd').textContent   = sums['Learning and Development'].toFixed(1);
}

// ── ROW SELECT ────────────────────────────────────
function toggleSelect(e, id) {
  if(e.target.tagName === 'INPUT') return;
  const tr = e.currentTarget;
  if(selectedRows.has(id)) { selectedRows.delete(id); tr.style.outline=''; }
  else { selectedRows.add(id); tr.style.outline='2px solid #2563eb'; }
  document.getElementById('deleteBtn').style.display = selectedRows.size?'':'none';
}

function deleteSelected() {
  if(!confirm(`ลบ ${selectedRows.size} แถว?`)) return;
  ROWS = ROWS.filter(r => !selectedRows.has(r.id));
  selectedRows.clear();
  document.getElementById('deleteBtn').style.display = 'none';
  renderTable();
  showToast(`ลบแล้ว`, 'ok');
}

// ── ADD ROW ───────────────────────────────────────
function openAddModal() { document.getElementById('modalBg').classList.add('open'); }
function closeModal()   { document.getElementById('modalBg').classList.remove('open'); }

function addRow() {
  const person = document.getElementById('m-person').value;
  const pos    = document.getElementById('m-pos').value;
  const type   = document.querySelector('#typeChips .chip.active')?.textContent || 'External';
  const proj   = document.getElementById('m-project').value.trim() || type;

  const existing = ROWS.find(r => r.name_en === person);
  const newRow = {
    id: nextId++,
    name_th: existing?.name_th || person,
    name_en: person,
    position: existing?.position || pos,
    position_2025: pos || existing?.position_2025 || '',
    team: existing?.team || '',
    type: type,
    project: proj,
    months: {}
  };
  ROWS.push(newRow);
  closeModal();
  // Set filter to show this person
  document.getElementById('filterPerson').value = person;
  renderTable();
  showToast('เพิ่มแถวแล้ว', 'ok');
}

// ── YEAR FILTER ───────────────────────────────────
function setYear(year, btn) {
  currentYear = year;
  document.querySelectorAll('.ytab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── EXPORT CSV ────────────────────────────────────
function exportCSV() {
  const months = getActiveMonths();
  const rows = getFilteredRows();
  const header = ['ชื่อ','Name-Surname','ตำแหน่ง','ตำแหน่ง (2025)','Team','Type','Project',...months];
  const csvRows = [header.join(',')];
  rows.forEach(r => {
    const cells = [r.name_th,r.name_en,r.position,r.position_2025,r.team,r.type,`"${r.project}"`,
      ...months.map(m => { const v=getCell(r,m); return v||''; })];
    csvRows.push(cells.join(','));
  });
  const blob = new Blob(['\uFEFF'+csvRows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `plan_all_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Export เรียบร้อย ✓','ok');
}

// ── TOAST ─────────────────────────────────────────
let toastTimer;
function showToast(msg, cls='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${cls} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── INIT ──────────────────────────────────────────
loadData();
</script>
